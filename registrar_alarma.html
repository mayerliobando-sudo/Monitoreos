<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Alarma - PGN</title>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f1f3f5; color: #1a1a1a; padding: 20px 30px; }
        .header { background: linear-gradient(135deg, #1a1a1a 0%, #003876 100%); color: #FFFFFF; padding: 28px 30px; border-radius: 12px; margin-bottom: 25px; border-bottom: 5px solid #FBD100; text-align: center; }
        .header h1 { font-size: 1.9rem; margin-bottom: 6px; }
        .header p { font-size: 1rem; opacity: 0.85; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { padding: 12px 22px; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: background 0.2s; display: inline-block; border: none; }
        .nav-btn.primary { background: #003876; color: #FFFFFF; }
        .nav-btn.primary:hover { background: #1a1a1a; }
        .nav-btn.accent { background: #FBD100; color: #1a1a1a; }
        .nav-btn.accent:hover { background: #e6c200; }
        .nav-btn.danger { background: #dc3545; color: #FFFFFF; }
        .nav-btn.danger:hover { background: #a71d2a; }
        .card { background: #FFFFFF; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .card h2 { color: #003876; margin-bottom: 20px; font-size: 1.4rem; }
        .card.left-accent { border-left: 5px solid #FBD100; }
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .kpi { background: #FFFFFF; border-radius: 10px; padding: 22px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-top: 4px solid #003876; transition: transform 0.2s; }
        .kpi:hover { transform: translateY(-3px); }
        .kpi.warn { border-top-color: #FBD100; }
        .kpi .label { font-size: 0.95rem; color: #3B4043; margin-bottom: 8px; font-weight: 600; }
        .kpi .value { font-size: 2rem; font-weight: 800; color: #1a1a1a; }
        .kpi .sub { font-size: 0.85rem; color: #8B9094; margin-top: 5px; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(580px, 1fr)); gap: 22px; margin-bottom: 30px; }
        .chart-card { background: #FFFFFF; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 5px; color: #3B4043; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #003876; }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-group-full { grid-column: 1 / -1; }
        .btn-submit { background: #FBD100; color: #1a1a1a; border: none; padding: 14px 40px; border-radius: 8px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn-submit:hover { background: #e6c200; }
        .btn-submit:disabled { background: #8B9094; cursor: not-allowed; }
        #form-status { margin-top: 12px; padding: 10px 15px; border-radius: 8px; display: none; font-weight: 600; }
        #form-status.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        #form-status.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #003876; color: #FFFFFF; padding: 10px 12px; text-align: left; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f8f9fa; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .btn-del:hover { background: #a71d2a; }
        .footer { text-align: center; margin-top: 30px; color: #8B9094; font-size: 0.85rem; padding: 15px; }
        @media (max-width: 900px) { .kpi-row, .charts { grid-template-columns: 1fr; } }
    </style></head><body>
<div class="header"><h1>Registro de Alarmas</h1><p>Procuraduria General de la Nacion</p></div>
<div class="nav-bar"><a href="dashboard_alarmas.html" class="nav-btn primary">Volver al Dashboard</a></div>
<div class="card left-accent">
    <h2>Registrar Nueva Alarma</h2>
    <form id="alarma-form"><div class="form-grid">
        <div class="form-group"><label>Mes</label><select id="mes" required><option value="">-- Seleccionar --</option><option value="Mayo">Mayo</option><option value="Junio">Junio</option><option value="Julio">Julio</option><option value="Agosto">Agosto</option><option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option><option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option></select></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="fecha" required></div>
        <div class="form-group"><label>Sistema</label><select id="sistema" required><option value="">-- Seleccionar --</option><option value="alarma de sim">alarma de sim</option><option value="alarma sim hominis">alarma sim hominis</option><option value="alarma strategos">alarma strategos</option><option value="apps intranet">apps intranet</option><option value="apps portal">apps portal</option><option value="apps portal url">apps portal url</option><option value="dokus y sede electronica">dokus y sede electronica</option><option value="estrategos">estrategos</option><option value="hominis">hominis</option><option value="homisis">homisis</option><option value="iga">iga</option><option value="insap">insap</option><option value="intranet">intranet</option><option value="intranet apps">intranet apps</option><option value="larma insap">larma insap</option><option value="portal web">portal web</option><option value="sede electronica">sede electronica</option><option value="siaf">siaf</option><option value="sigdea">sigdea</option><option value="sim">sim</option><option value="siri">siri</option><option value="siri
sigdea">siri
sigdea</option><option value="strategos">strategos</option><option value="x road">x road</option><option value="x-road">x-road</option><option value="__otro__">Otro (escribir)</option></select></div>
        <div class="form-group" id="otro-g" style="display:none;"><label>Nombre del sistema</label><input type="text" id="otro_sistema"></div>
        <div class="form-group"><label>Horario</label><select id="horario" required><option value="">-- Seleccionar --</option><option value="Manana (8:00)">Manana (8:00)</option><option value="Medio dia (12:00)">Medio dia (12:00)</option><option value="Tarde (16:00)">Tarde (16:00)</option></select></div>
        <div class="form-group form-group-full"><label>Descripcion del Inconveniente</label><textarea id="inconveniente" required placeholder="Describa el fallo..."></textarea></div>
        <div class="form-group form-group-full"><label>Comentario del Administrador</label><textarea id="comentario" placeholder="Ticket, acciones, recomendaciones..."></textarea></div>
    </div><button type="submit" class="btn-submit" id="btn-e">Registrar Alarma</button></form>
    <div id="form-status"></div>
</div>

<script>
document.getElementById('sistema').addEventListener('change', function(){ document.getElementById('otro-g').style.display = this.value==='__otro__'?'flex':'none'; });
document.getElementById('alarma-form').addEventListener('submit', function(e){
    e.preventDefault(); var btn=document.getElementById('btn-e'), st=document.getElementById('form-status');
    btn.disabled=true; btn.textContent='Enviando...';
    var sis=document.getElementById('sistema').value;
    if(sis==='__otro__'){ sis=document.getElementById('otro_sistema').value.trim(); if(!sis){ st.className='error'; st.textContent='Escriba el nombre del sistema.'; st.style.display='block'; btn.disabled=false; btn.textContent='Registrar Alarma'; return; } }
    fetch('/api/alarma',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ mes:document.getElementById('mes').value, fecha:document.getElementById('fecha').value, sistema:sis, horario:document.getElementById('horario').value, inconveniente:document.getElementById('inconveniente').value, comentario:document.getElementById('comentario').value }) })
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d.ok){ st.className='success'; st.textContent='Alarma registrada. Recargando...'; st.style.display='block'; document.getElementById('alarma-form').reset(); setTimeout(function(){ location.reload(); },2000); } else { st.className='error'; st.textContent='Error: '+(d.error||''); st.style.display='block'; } })
    .catch(function(e){ st.className='error'; st.textContent='Error: '+e; st.style.display='block'; })
    .finally(function(){ btn.disabled=false; btn.textContent='Registrar Alarma'; });
});
function borrar(idx){ if(!confirm('Seguro que desea borrar esta alarma?')) return;
    fetch('/api/alarma/'+idx, { method:'DELETE' }).then(function(r){ return r.json(); }).then(function(d){ if(d.ok) location.reload(); else alert('Error: '+(d.error||'')); }).catch(function(e){ alert('Error: '+e); });
}
</script></body></html>
